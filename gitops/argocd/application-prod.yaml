# ─────────────────────────────────────────────────────────────
# ArgoCD Application — PROD environment
# ─────────────────────────────────────────────────────────────
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: wdp301-prod
  namespace: argocd
  labels:
    environment: prod
    project: wdp301
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/SUMMER2026SE/wdp301-rbl-project-wdp_se18d08_group-7.git
    targetRevision: dummy-app
    path: gitops/charts/app
    helm:
      releaseName: wdp301-prod
      valueFiles:
        - ../../overlays/prod/values-override.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: prod

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m

  revisionHistoryLimit: 10
