user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ============================================================
    # Upstream: Trỏ về API Gateway NestJS đang chạy trên host máy tính
    # host.docker.internal = địa chỉ máy tính Mac từ trong Docker
    # ============================================================
    upstream api_gateway {
        server host.docker.internal:4000 max_fails=3 fail_timeout=10s;
        keepalive 32;
    }

    # ============================================================
    # Log format
    # ============================================================
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    # ============================================================
    # Server Block: Nhận request tại port 80
    # ============================================================
    server {
        listen 80;
        server_name localhost;

        # Forward tất cả request tới API Gateway
        location / {
            proxy_pass http://api_gateway;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # Truyền thông tin thực của client qua headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeout settings
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Endpoint health check riêng cho Nginx
        location /nginx-health {
            access_log off;
            return 200 "Nginx is alive!\n";
            add_header Content-Type text/plain;
        }
    }
}
